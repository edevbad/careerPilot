name: careerpilot_mobile
description: "CareerPilot — AI-powered career roadmap app (prototype)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.jpg"

flutter_native_splash:
  color: "#080C18"
  image: "assets/icon.jpg"
  android_12:
    image: "assets/icon.jpg"
    color: "#080C18"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.jpg
